{% include base_path %}

<!-- start custom head snippets -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%232563EB'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Helvetica,Arial,sans-serif' font-weight='700' font-size='40' fill='white'%3EE%3C/text%3E%3C/svg%3E">
<meta name="theme-color" content="#2563EB">
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<script type="text/x-mathjax-config"> MathJax.Hub.Config({ TeX: { equationNumbers: { autoNumber: "all" } } }); </script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [ ['$','$'], ["\\(","\\)"] ],
      processEscapes: true
    }
  });
</script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/latest.js?config=TeX-MML-AM_CHTML' async></script>

<style>
  body {
    font-family: "Inter", "Helvetica Neue", Helvetica, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "kern", "liga", "calt";
  }
  .page__content {
    font-size: 1rem;
    line-height: 1.7;
    color: #2a2a2a;
  }
  .page__content p { margin-bottom: 1.15em; }
  .page__content h1, .page__content h2, .page__content h3 {
    font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #1a1a1a;
  }
  .page__content h2 {
    margin-top: 2em;
    margin-bottom: 0.6em;
    padding-bottom: 0.3em;
    border-bottom: 1px solid #e6e6e6;
    font-size: 1.25rem;
  }
  .page__content hr {
    border: 0;
    border-top: 1px solid #e6e6e6;
    margin: 2em 0;
  }
  .page__content a {
    color: #2563EB;
    text-decoration: none;
    border-bottom: 1px solid rgba(37, 99, 235, 0.25);
    transition: border-color 0.15s ease;
  }
  .page__content a:hover {
    border-bottom-color: #2563EB;
  }
  .author__name { font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif; font-weight: 600; }
  .author__bio  { font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif; }

  /* Force a clean circular profile photo (was rendering oval because the source is not square) */
  .author__avatar img {
    width: 175px;
    height: 175px;
    max-width: 175px;
    object-fit: cover;
    object-position: center top;
    border-radius: 50%;
    aspect-ratio: 1 / 1;
  }

  /* Navbar */
  .masthead {
    background: #2563EB;
    border-bottom: none;
  }
  .masthead__inner-wrap { color: #ffffff; }
  .greedy-nav { background: transparent; }
  .greedy-nav,
  .greedy-nav a,
  .greedy-nav .visible-links a,
  .masthead__menu-item a {
    color: #ffffff !important;
    font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  .greedy-nav a:hover {
    color: #dbeafe !important;
  }
  .greedy-nav .visible-links a:before {
    background: #ffffff;
  }
  .greedy-nav button {
    background: #2563EB;
  }
  .greedy-nav button .navicon,
  .greedy-nav button .navicon:before,
  .greedy-nav button .navicon:after {
    background: #ffffff;
  }
</style>

<!-- end custom head snippets -->
